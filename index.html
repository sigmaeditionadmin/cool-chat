<!DOCTYPE html>
<html>
<head>
<title>Cool Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#36393f;
color:white;
display:flex;
height:100vh;
}

/* sidebar */

#sidebar{
width:200px;
background:#2f3136;
padding:10px;
}

#sidebar h3{
margin-top:0;
}

/* chat area */

#main{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow-y:auto;
padding:10px;
}

.msg{
background:#40444b;
padding:8px;
margin:5px;
border-radius:6px;
}

#inputArea{
background:#2f3136;
padding:10px;
}

input{
padding:8px;
margin:3px;
}

button{
padding:8px;
}

</style>

</head>

<body>

<div id="sidebar">

<h3>Room</h3>

<input id="room" placeholder="room code">
<button onclick="joinRoom()">Join</button>

</div>

<div id="main">

<div id="chat"></div>

<div id="inputArea">

<input id="name" placeholder="name">
<input id="msg" placeholder="message">

<button onclick="send()">Send</button>

</div>

</div>

<script>

let room="default"

function joinRoom(){

room=document.getElementById("room").value

load()

}

async function load(){

let res = await fetch("https://api.thinger.io/v1/messages/"+room)

let data = await res.json()

let chat=document.getElementById("chat")

chat.innerHTML=""

data.forEach(m=>{

chat.innerHTML += `<div class="msg"><b>${m.name}</b><br>${m.msg}</div>`

})

chat.scrollTop=chat.scrollHeight

}

async function send(){

let name=document.getElementById("name").value
let msg=document.getElementById("msg").value

await fetch("https://api.thinger.io/v1/messages/"+room,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:name,
msg:msg

})

})

document.getElementById("msg").value=""

load()

}

setInterval(load,2000)

load()

</script>

</body>
</html>
