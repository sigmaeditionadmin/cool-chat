<!DOCTYPE html>
<html>
<head>
<title>Better Chat</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#313338;
color:white;
display:flex;
height:100vh;
}

#sidebar{
width:240px;
background:#1e1f22;
padding:15px;
}

#sidebar input,#sidebar button{
width:100%;
padding:8px;
margin-bottom:8px;
border:none;
border-radius:6px;
background:#2b2d31;
color:white;
}

#sidebar button{
background:#5865f2;
cursor:pointer;
}

#users{
margin-top:10px;
font-size:14px;
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
background:#2b2d31;
padding:10px;
margin-bottom:10px;
border-radius:10px;
max-width:500px;
}

.msg b{
color:#57f287;
}

.time{
font-size:10px;
color:#aaa;
}

#inputArea{
display:flex;
gap:10px;
padding:15px;
background:#1e1f22;
}

#inputArea input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
background:#2b2d31;
color:white;
}

#typing{
font-size:12px;
color:#aaa;
margin-left:20px;
}
</style>
</head>

<body>

<div id="sidebar">

<h3>Room</h3>

<button onclick="createRoom()">Create Room</button>

<input id="roomInput" placeholder="enter room code">

<button onclick="joinRoom()">Join Room</button>

<p id="roomDisplay"></p>

<h4>Users</h4>
<div id="users"></div>

</div>

<div id="main">

<div id="chat"></div>

<div id="typing"></div>

<div id="inputArea">

<input id="name" placeholder="name">
<input id="msg" placeholder="message">
<button onclick="send()">Send</button>

</div>

</div>

<script>

let peer
let connections=[]
let seenMessages=new Set()
let users=new Set()

// load saved name
document.getElementById("name").value =
localStorage.getItem("chatName") || ""

// save name
document.getElementById("name").addEventListener("input",e=>{
localStorage.setItem("chatName", e.target.value)
})

// auto join from URL
let params=new URLSearchParams(location.search)
if(params.get("room")){
document.getElementById("roomInput").value=params.get("room")
}

// UI
function addMessage(name,msg,system=false){
let time=new Date().toLocaleTimeString()
let chat=document.getElementById("chat")

chat.innerHTML+=`
<div class="msg">
<b>${system ? "" : name}</b>
${msg}
<div class="time">${time}</div>
</div>
`
chat.scrollTop=chat.scrollHeight
}

function updateUsers(){
let div=document.getElementById("users")
div.innerHTML=""
users.forEach(u=>{
div.innerHTML+=u+"<br>"
})
}

// ✅ FIXED MESSAGE HANDLER
function handleMessage(data, sender=null){

// USER JOIN
if(data.type==="join"){
users.add(data.name)
updateUsers()

let listData={
type:"userList",
list:Array.from(users)
}

// send full list to everyone
connections.forEach(c=>c.send(listData))

return
}

// RECEIVE FULL USER LIST
if(data.type==="userList"){
users=new Set(data.list)
updateUsers()
return
}

// TYPING
if(data.type==="typing"){
document.getElementById("typing").innerText=data.name+" is typing..."
setTimeout(()=>document.getElementById("typing").innerText="",1000)
return
}

// NORMAL MESSAGE
if(seenMessages.has(data.id)) return
seenMessages.add(data.id)

addMessage(data.name,data.msg)

// forward
connections.forEach(c=>{
if(c!==sender) c.send(data)
})

}

// CREATE ROOM
function createRoom(){

peer=new Peer()

peer.on("open",id=>{
document.getElementById("roomDisplay").innerText="Room: "+id
history.replaceState(null,"","?room="+id)
})

peer.on("connection",conn=>{

connections.push(conn)

conn.on("data",(data)=>handleMessage(data, conn))

let name=document.getElementById("name").value || "Anonymous"

// send join
conn.send({type:"join",name:name})

// show join message
addMessage("", name+" joined", true)

})

}

// JOIN ROOM
function joinRoom(){

let roomId=document.getElementById("roomInput").value

peer=new Peer()

peer.on("open",()=>{

let conn=peer.connect(roomId)

connections.push(conn)

conn.on("data",(data)=>handleMessage(data, conn))

let name=document.getElementById("name").value || "Anonymous"

// send join
conn.send({type:"join",name:name})

// show join message
addMessage("", name+" joined", true)

})

document.getElementById("roomDisplay").innerText="Room: "+roomId
history.replaceState(null,"","?room="+roomId)

}

// SEND MESSAGE
function send(){

let name=document.getElementById("name").value || "Anonymous"
let msg=document.getElementById("msg").value

if(!msg) return

let data={
id:crypto.randomUUID(),
name:name,
msg:msg
}

handleMessage(data)

document.getElementById("msg").value=""

}

// TYPING
document.getElementById("msg").addEventListener("input",()=>{

let name=document.getElementById("name").value || "Anonymous"

connections.forEach(c=>{
c.send({type:"typing",name:name})
})

})

// ENTER TO SEND
document.getElementById("msg").addEventListener("keypress",e=>{
if(e.key==="Enter") send()
})

</script>

</body>
</html>
