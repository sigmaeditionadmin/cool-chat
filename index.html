<!DOCTYPE html>
<html>
<head>
<title>Cool Chat</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#313338;
color:white;
display:flex;
height:100vh;
}

#sidebar{
width:220px;
background:#1e1f22;
padding:15px;
}

#sidebar input{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:6px;
border:none;
background:#2b2d31;
color:white;
}

#sidebar button{
width:100%;
padding:8px;
margin-bottom:6px;
border:none;
border-radius:6px;
background:#5865f2;
color:white;
cursor:pointer;
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
background:#2b2d31;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

#inputArea{
display:flex;
gap:10px;
padding:15px;
background:#1e1f22;
}

#inputArea input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
background:#2b2d31;
color:white;
}

#inputArea button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#5865f2;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<div id="sidebar">

<h3>Chat Room</h3>

<input id="room" placeholder="room code">

<button onclick="joinRoom()">Join Room</button>

<button onclick="createRoom()">Create Room</button>

<p id="roomDisplay">Current Room: default</p>

</div>

<div id="main">

<div id="chat"></div>

<div id="inputArea">

<input id="name" placeholder="name">

<input id="msg" placeholder="message">

<button onclick="send()">Send</button>

</div>

</div>

<script>

let room="default"

let database={}

function joinRoom(){

room=document.getElementById("room").value || "default"

document.getElementById("roomDisplay").innerText="Current Room: "+room

if(!database[room]) database[room]=[]

load()

}

function createRoom(){

let code=Math.random().toString(36).substring(2,8)

document.getElementById("room").value=code

joinRoom()

}

function load(){

let chat=document.getElementById("chat")

chat.innerHTML=""

let messages=database[room] || []

messages.forEach(m=>{

chat.innerHTML+=`
<div class="msg">
<b>${m.name}</b><br>
${m.msg}
</div>
`

})

chat.scrollTop=chat.scrollHeight

}

function send(){

let name=document.getElementById("name").value || "Anonymous"

let msg=document.getElementById("msg").value

if(!msg) return

if(!database[room]) database[room]=[]

database[room].push({
name:name,
msg:msg
})

document.getElementById("msg").value=""

load()

}

</script>

</body>
</html>
