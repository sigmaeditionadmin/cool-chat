<!DOCTYPE html>
<html>
<head>
<title>Cool Chat</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#313338;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

#sidebar{
width:220px;
background:#1e1f22;
padding:15px;
box-shadow:2px 0px 10px rgba(0,0,0,0.5);
}

#sidebar h3{
margin-top:0;
color:#b5bac1;
}

#sidebar input{
width:100%;
padding:8px;
border-radius:6px;
border:none;
margin-bottom:8px;
background:#2b2d31;
color:white;
}

#sidebar button{
width:100%;
padding:8px;
border:none;
border-radius:6px;
background:#5865f2;
color:white;
cursor:pointer;
margin-bottom:6px;
}

#sidebar button:hover{
background:#4752c4;
}

#roomDisplay{
margin-top:10px;
color:#b5bac1;
font-size:14px;
}

/* MAIN AREA */

#main{
flex:1;
display:flex;
flex-direction:column;
}

/* CHAT AREA */

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

/* MESSAGE */

.msg{
background:#2b2d31;
padding:10px 14px;
margin-bottom:10px;
border-radius:10px;
max-width:600px;
}

.msg b{
color:#57f287;
}

/* INPUT AREA */

#inputArea{
background:#1e1f22;
padding:15px;
display:flex;
gap:10px;
}

#inputArea input{
flex:1;
padding:10px;
border-radius:8px;
border:none;
background:#2b2d31;
color:white;
}

#inputArea button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#5865f2;
color:white;
cursor:pointer;
}

#inputArea button:hover{
background:#4752c4;
}

</style>

</head>

<body>

<div id="sidebar">

<h3>Chat Room</h3>

<input id="room" placeholder="room code">

<button onclick="joinRoom()">Join Room</button>

<button onclick="createRoom()">Create Room</button>

<p id="roomDisplay">Current Room: default</p>

</div>

<div id="main">

<div id="chat"></div>

<div id="inputArea">

<input id="name" placeholder="name">

<input id="msg" placeholder="message">

<button onclick="send()">Send</button>

</div>

</div>

<script>

let room="default"

function joinRoom(){

room=document.getElementById("room").value || "default"

document.getElementById("roomDisplay").innerText="Current Room: "+room

load()

}

function createRoom(){

let code=Math.random().toString(36).substring(2,8)

document.getElementById("room").value=code

joinRoom()

}

async function load(){

try{

let res=await fetch("https://api.thinger.io/v1/messages/"+room)

let data=await res.json()

let chat=document.getElementById("chat")

chat.innerHTML=""

if(!Array.isArray(data)){

chat.innerHTML="<div class='msg'>No messages yet.</div>"

return

}

data.forEach(m=>{

chat.innerHTML+=`
<div class="msg">
<b>${m.name || "User"}</b><br>
${m.msg || ""}
</div>
`

})

chat.scrollTop=chat.scrollHeight

}catch(e){

console.log(e)

}

}

async function send(){

let name=document.getElementById("name").value || "Anonymous"

let msg=document.getElementById("msg").value

if(msg==="") return

try{

await fetch("https://api.thinger.io/v1/messages/"+room,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name:name,
msg:msg
})

})

document.getElementById("msg").value=""

load()

}catch(e){

console.log(e)

}

}

setInterval(load,2000)

load()

</script>

</body>
</html>
