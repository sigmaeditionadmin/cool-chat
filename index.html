<!DOCTYPE html>
<html>
<head>
<title>Better Chat</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#313338;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */
#sidebar{
width:240px;
background:#1e1f22;
padding:15px;
}

#sidebar input,#sidebar button{
width:100%;
padding:8px;
margin-bottom:8px;
border:none;
border-radius:6px;
background:#2b2d31;
color:white;
}

#sidebar button{
background:#5865f2;
cursor:pointer;
}

#users{
margin-top:10px;
font-size:14px;
}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

/* MESSAGE STYLE */
.msg{
background:#2b2d31;
padding:10px;
margin-bottom:10px;
border-radius:10px;
max-width:500px;
}

.msg b{
color:#57f287;
}

.time{
font-size:10px;
color:#aaa;
margin-top:4px;
}

/* INPUT */
#inputArea{
display:flex;
gap:10px;
padding:15px;
background:#1e1f22;
}

#inputArea input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
background:#2b2d31;
color:white;
}

#typing{
font-size:12px;
color:#aaa;
margin-left:20px;
}
</style>
</head>

<body>

<div id="sidebar">

<h3>Room</h3>

<button onclick="createRoom()">Create Room</button>

<input id="roomInput" placeholder="enter room code">

<button onclick="joinRoom()">Join Room</button>

<p id="roomDisplay"></p>

<h4>Users</h4>
<div id="users"></div>

</div>

<div id="main">

<div id="chat"></div>

<div id="typing"></div>

<div id="inputArea">

<input id="name" placeholder="name">

<input id="msg" placeholder="message">

<button onclick="send()">Send</button>

</div>

</div>

<script>

let peer
let connections=[]
let seenMessages=new Set()
let users=new Set()

// load saved name
document.getElementById("name").value =
localStorage.getItem("chatName") || ""

// save name
document.getElementById("name").addEventListener("input",e=>{
localStorage.setItem("chatName", e.target.value)
})

// auto join from URL
let params=new URLSearchParams(location.search)
if(params.get("room")){
document.getElementById("roomInput").value=params.get("room")
}

// UI helpers
function addMessage(name,msg,system=false){

let time=new Date().toLocaleTimeString()

let chat=document.getElementById("chat")

chat.innerHTML+=`
<div class="msg">
<b>${system ? "" : name}</b>
${system ? msg : msg}
<div class="time">${time}</div>
</div>
`

chat.scrollTop=chat.scrollHeight

}

function updateUsers(){
let div=document.getElementById("users")
div.innerHTML=""
users.forEach(u=>{
div.innerHTML+=u+"<br>"
})
}

// message handler
function handleMessage(data, sender=null){

if(data.type==="user"){
users.add(data.name)
updateUsers()
return
}

if(data.type==="typing"){
document.getElementById("typing").innerText=data.name+" is typing..."
setTimeout(()=>document.getElementById("typing").innerText="",1000)
return
}

if(seenMessages.has(data.id)) return
seenMessages.add(data.id)

addMessage(data.name,data.msg)

// forward
connections.forEach(c=>{
if(c!==sender) c.send(data)
})

}

// create room
function createRoom(){

peer=new Peer()

peer.on("open",id=>{
document.getElementById("roomDisplay").innerText="Room: "+id

// update URL
history.replaceState(null,"","?room="+id)
})

peer.on("connection",conn=>{

connections.push(conn)

conn.on("data",(data)=>handleMessage(data, conn))

// send user info
let name=document.getElementById("name").value || "Anonymous"
conn.send({type:"user",name:name})

addMessage("", name+" joined", true)

})

}

// join room
function joinRoom(){

let roomId=document.getElementById("roomInput").value

peer=new Peer()

peer.on("open",()=>{

let conn=peer.connect(roomId)

connections.push(conn)

conn.on("data",(data)=>handleMessage(data, conn))

let name=document.getElementById("name").value || "Anonymous"

conn.send({type:"user",name:name})

addMessage("", name+" joined", true)

})

document.getElementById("roomDisplay").innerText="Room: "+roomId

history.replaceState(null,"","?room="+roomId)

}

// send message
function send(){

let name=document.getElementById("name").value || "Anonymous"
let msg=document.getElementById("msg").value

if(!msg) return

let data={
id:crypto.randomUUID(),
name:name,
msg:msg
}

handleMessage(data)

document.getElementById("msg").value=""

}

// typing indicator
document.getElementById("msg").addEventListener("input",()=>{

let name=document.getElementById("name").value || "Anonymous"

connections.forEach(c=>{
c.send({type:"typing",name:name})
})

})

// ENTER to send
document.getElementById("msg").addEventListener("keypress",e=>{
if(e.key==="Enter") send()
})

</script>

</body>
</html>
