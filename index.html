<!DOCTYPE html>
<html>
<head>
<title>Cool Chat</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#313338;
color:white;
display:flex;
height:100vh;
}

#sidebar{
width:240px;
background:#1e1f22;
padding:15px;
}

#sidebar input,#sidebar button{
width:100%;
padding:8px;
margin-bottom:8px;
border:none;
border-radius:6px;
background:#2b2d31;
color:white;
}

#sidebar button{
background:#5865f2;
cursor:pointer;
}

#users{
margin-top:10px;
font-size:14px;
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
background:#2b2d31;
padding:10px;
margin-bottom:10px;
border-radius:10px;
max-width:500px;
}

.msg b{
color:#57f287;
}

.time{
font-size:10px;
color:#aaa;
}

#inputArea{
display:flex;
gap:10px;
padding:15px;
background:#1e1f22;
}

#inputArea input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
background:#2b2d31;
color:white;
}

#typing{
font-size:12px;
color:#aaa;
margin-left:20px;
}

#status{
font-size:12px;
color:#aaa;
margin-top:5px;
}
</style>
</head>

<body>

<div id="sidebar">

<h3>Room</h3>

<button onclick="createRoom()">Create Room</button>

<input id="roomInput" placeholder="enter room code">

<button onclick="joinRoom()">Join Room</button>

<button onclick="copyInvite()">Get Invite Link</button>

<p id="roomDisplay"></p>
<p id="status"></p>

<h4>Users</h4>
<div id="users"></div>

</div>

<div id="main">

<div id="chat"></div>

<div id="typing"></div>

<div id="inputArea">

<input id="name" placeholder="name">
<input id="msg" placeholder="message">
<button onclick="send()">Send</button>
<button onclick="pauseChat()">Pause</button>

</div>

</div>

<script>

// ===== MESSAGE STORAGE PER ROOM =====
let messageHistory = []
function saveMessages(){
  if(currentRoom){
    localStorage.setItem("chatHistory_"+currentRoom, JSON.stringify(messageHistory))
  }
}
function loadMessages(){
  if(currentRoom){
    let data = localStorage.getItem("chatHistory_"+currentRoom)
    messageHistory = data ? JSON.parse(data) : []
  }
  let chat = document.getElementById("chat")
  chat.innerHTML=""
  messageHistory.forEach(m=>{
    chat.innerHTML += `
    <div class="msg">
      <b>${m.system ? "" : m.name}</b>
      ${m.msg}
      <div class="time">${m.time}</div>
    </div>
    `
  })
  chat.scrollTop = chat.scrollHeight
}

// ===== PEER SETUP =====
let peer = new Peer({
  host: '0.peerjs.com',
  port: 443,
  path: '/',
  secure: true,
  config:{
    iceServers:[
      { urls:"stun:stun.l.google.com:19302" },
      { urls:"stun:stun1.l.google.com:19302" }
    ]
  }
})

let peerReady=false
let myId=null
let connections=[]
let seenMessages=new Set()
let users=new Map()
let hasJoined=false
let currentRoom=null
let paused=false
let buffer=[]

peer.on("open",(id)=>{ 
  peerReady=true 
  myId=id
  document.getElementById("status").innerText="Ready ✅"
})

// ===== NAME SAVE =====
document.getElementById("name").value =
localStorage.getItem("chatName") || ""

document.getElementById("name").addEventListener("input",e=>{
localStorage.setItem("chatName", e.target.value)
})

// ===== UI =====
function addMessage(name,msg,system=false){
let time=new Date().toLocaleTimeString()
let chat=document.getElementById("chat")

chat.innerHTML+=`
<div class="msg">
<b>${system ? "" : name}</b>
${msg}
<div class="time">${time}</div>
</div>
`
chat.scrollTop=chat.scrollHeight

messageHistory.push({name,msg,system,time})
saveMessages()
}

function updateUsers(){
let div=document.getElementById("users")
div.innerHTML=""
users.forEach(u=>{
let color = u.online ? "🟢" : "🔴"
div.innerHTML += color + " " + u.name + "<br>"
})
}

// ===== MESSAGE HANDLER =====
function handleMessage(data, sender=null){

if(paused){
buffer.push(data)
return
}

if(data.type==="join"){
users.set(data.name, {name:data.name, online:true})
updateUsers()

connections.forEach(c=>{
c.send({
type:"userList",
list:Array.from(users.values())
})
})
return
}

if(data.type==="userList"){
users = new Map()
data.list.forEach(u=>{
users.set(u.name, u)
})
updateUsers()
return
}

if(data.type==="typing"){
document.getElementById("typing").innerText=data.name+" is typing..."
setTimeout(()=>document.getElementById("typing").innerText="",1000)
return
}

if(seenMessages.has(data.id)) return
seenMessages.add(data.id)

addMessage(data.name,data.msg)

connections.forEach(c=>{
if(c!==sender) c.send(data)
})
}

// ===== CREATE ROOM =====
function createRoom(){

if(hasJoined || !peerReady) return
hasJoined=true

currentRoom=myId

document.getElementById("roomDisplay").innerText="Room: "+currentRoom
history.replaceState(null,"","?room="+currentRoom)

loadMessages()

document.getElementById("status").innerText="Room created ⚡"

peer.on("connection",conn=>{
connections.push(conn)
conn.on("data",(data)=>handleMessage(data, conn))

let name=document.getElementById("name").value || "Anonymous"
conn.send({type:"join",name:name})
addMessage("", name+" joined", true)

conn.on("close",()=>{
users.forEach(u=>{
if(u.name===name){
u.online=false
addMessage("", u.name+" left", true)
}
})
updateUsers()
})
})
}

// ===== JOIN ROOM =====
function joinRoom(){

if(!peerReady) return

let roomId=document.getElementById("roomInput").value
currentRoom=roomId

loadMessages()

document.getElementById("status").innerText="Connecting ⚡..."

let conn = peer.connect(roomId)
connections.push(conn)

conn.on("open",()=>{
hasJoined=true
let name=document.getElementById("name").value || "Anonymous"
conn.send({type:"join",name:name})
addMessage("", name+" joined", true)
document.getElementById("status").innerText="Connected ✅"
})

conn.on("data",(data)=>handleMessage(data, conn))

conn.on("close",()=>{
document.getElementById("status").innerText="Reconnecting..."
setTimeout(()=>joinRoom(),1000)
})

conn.on("error",()=>{
setTimeout(()=>joinRoom(),1000)
})

document.getElementById("roomDisplay").innerText="Room: "+roomId
history.replaceState(null,"","?room="+roomId)
}

// ===== SEND =====
function send(){

if(paused) return

let name=document.getElementById("name").value || "Anonymous"
let msg=document.getElementById("msg").value
if(!msg) return

let data={
id:crypto.randomUUID(),
name:name,
msg:msg
}

handleMessage(data)
document.getElementById("msg").value=""
}

// ===== TYPING =====
document.getElementById("msg").addEventListener("input",()=>{
let name=document.getElementById("name").value || "Anonymous"
connections.forEach(c=>{
c.send({type:"typing",name:name})
})
})

// ===== ENTER =====
document.getElementById("msg").addEventListener("keypress",e=>{
if(e.key==="Enter") send()
})

// ===== INVITE =====
function copyInvite(){
if(!currentRoom){
alert("Create or join first!")
return
}
let link=location.origin+location.pathname+"?room="+currentRoom
navigator.clipboard.writeText(link)
document.getElementById("status").innerText="Invite copied!"
}

// ===== PAUSE =====
function pauseChat(){
paused=!paused
if(!paused){
buffer.forEach(msg=>handleMessage(msg))
buffer=[]
}
document.getElementById("status").innerText =
paused ? "Paused ⏸️" : "Resumed ▶️"
}

// ===== AUTO JOIN =====
let params = new URLSearchParams(location.search)
if(params.get("room")){
let roomId = params.get("room")
document.getElementById("roomInput").value = roomId
document.getElementById("status").innerText = "Preparing to join..."

function tryAutoJoin(){
  if(peerReady){
    joinRoom()
  } else {
    setTimeout(tryAutoJoin, 100)
  }
}
tryAutoJoin()
}

</script>

</body>
</html>
