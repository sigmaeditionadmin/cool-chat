<!DOCTYPE html>
<html>
<head>
<title>P2P Chat</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#313338;
color:white;
display:flex;
height:100vh;
}

#sidebar{
width:220px;
background:#1e1f22;
padding:15px;
}

#sidebar input{
width:100%;
padding:8px;
margin-bottom:8px;
border:none;
border-radius:6px;
background:#2b2d31;
color:white;
}

#sidebar button{
width:100%;
padding:8px;
margin-bottom:6px;
border:none;
border-radius:6px;
background:#5865f2;
color:white;
cursor:pointer;
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
background:#2b2d31;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

#inputArea{
display:flex;
gap:10px;
padding:15px;
background:#1e1f22;
}

#inputArea input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
background:#2b2d31;
color:white;
}

#inputArea button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#5865f2;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div id="sidebar">

<h3>Room</h3>

<button onclick="createRoom()">Create Room</button>

<input id="roomInput" placeholder="enter room code">

<button onclick="joinRoom()">Join Room</button>

<p id="roomDisplay"></p>

</div>

<div id="main">

<div id="chat"></div>

<div id="inputArea">

<input id="name" placeholder="name">

<input id="msg" placeholder="message">

<button onclick="send()">Send</button>

</div>

</div>

<script>

let peer
let connections=[]
let seenMessages=new Set()

function addMessage(name,msg){

let chat=document.getElementById("chat")

chat.innerHTML+=`
<div class="msg">
<b>${name}</b><br>
${msg}
</div>
`

chat.scrollTop=chat.scrollHeight

}

function handleMessage(data){

if(seenMessages.has(data.id)) return

seenMessages.add(data.id)

addMessage(data.name,data.msg)

connections.forEach(c=>c.send(data))

}

function createRoom(){

peer=new Peer()

peer.on("open",id=>{

document.getElementById("roomDisplay").innerText="Room Code: "+id

})

peer.on("connection",conn=>{

connections.push(conn)

conn.on("data",handleMessage)

})

}

function joinRoom(){

let roomId=document.getElementById("roomInput").value

peer=new Peer()

peer.on("open",()=>{

let conn=peer.connect(roomId)

connections.push(conn)

conn.on("data",handleMessage)

})

document.getElementById("roomDisplay").innerText="Joined Room: "+roomId

}

function send(){

let name=document.getElementById("name").value || "Anonymous"
let msg=document.getElementById("msg").value

if(!msg) return

let data={
id:crypto.randomUUID(),
name:name,
msg:msg
}

handleMessage(data)

document.getElementById("msg").value=""

}

</script>

</body>
</html>
